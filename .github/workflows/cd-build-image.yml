name: Build & Publish Docker Image

on:
  push:
    branches: ["dev", "main"]
  release:
    types: [published]

jobs:
  build:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'release' && 'main' || github.ref }}

      # Enable multi-arch
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      # Enable buildx
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Login to GHCR
      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set build variables
        id: vars
        run: |
          if [ "${{ github.event_name }}" = "release" ]; then
            VERSION=${{ github.event.release.tag_name }}
            VERSION=${VERSION#v}
            echo "TAGS=ghcr.io/${{ github.repository }}:${VERSION},ghcr.io/${{ github.repository }}:latest" >> $GITHUB_OUTPUT

          elif [ "${GITHUB_REF_NAME}" = "main" ]; then
            echo "TAGS=ghcr.io/${{ github.repository }}:prod" >> $GITHUB_OUTPUT

          else
            echo "TAGS=ghcr.io/${{ github.repository }}:dev" >> $GITHUB_OUTPUT
          fi

      - name: Build & Push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.vars.outputs.TAGS }}
