/app/logs/raw_data/raw_data.jsonl {
    # Rotate daily
    daily
    
    # Keep 7 days of logs
    rotate 7
    
    # Compress old logs
    compress
    delaycompress
    
    # Don't rotate if empty
    notifempty
    
    # Create new files with these permissions
    create 644 root root
    
    # Use date as suffix instead of numbers
    dateext
    dateformat -%Y%m%d
    
    # Don't error if log file is missing
    missingok
    
    # Truncate original file after copying (safer than moving)
    copytruncate
    
    # Run commands after rotation
    postrotate
    endscript
}
