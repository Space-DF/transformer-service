# Server Configuration
server:
  log_level: "info"

# AMQP Consumer Configuration - Using existing amq.topic from MQTT
amqp:
  broker_url: "amqp://default:password@rabbitmq:5672/"
  exchange: "amq.topic"
  queue: "transformer_device_queue"
  routing_key: "tenant.*.device.data"
  output_topic: "tenant.*.transformed.device.location"
  consumer_tag: "transformer-service"
  prefetch_count: 10
  auto_ack: false